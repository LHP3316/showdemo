<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧本工位 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/workbench-modern.css">
</head>
<body>
  <main class="app-page">
    <header class="app-topbar">
      <div class="brand">
        <span class="brand-badge">AI</span>
        <span class="brand-name">AI短剧协作台</span>
      </div>
      <nav class="top-nav">
        <button id="nav-workspace" class="top-nav-btn" type="button">工作台</button>
        <button id="nav-project" class="top-nav-btn" type="button">项目管理</button>
        <button id="nav-render" class="top-nav-btn" type="button">生成队列</button>
        <button id="nav-review" class="top-nav-btn" type="button">审核中心</button>
      </nav>
      <div class="top-right">
        <span class="avatar">U</span>
        <span id="top-username" class="username">User</span>
        <button id="btn-logout" class="logout-btn" type="button">退出</button>
      </div>
    </header>

    <section class="page-header">
      <h1 id="script-page-title" class="page-title">剧本工位</h1>
      <p id="script-page-subtitle" class="page-subtitle">加载中...</p>
      <div id="script-status" class="status-line">Ready</div>
    </section>

    <section class="grid-2">
      <article class="panel">
        <h2 class="panel-title">剧本编辑</h2>
        <textarea id="script-editor" class="textarea" placeholder="在这里编辑项目剧本..."></textarea>
        <div class="actions" style="margin-top:10px;">
          <button id="btn-save-script" class="btn btn-primary" type="button">保存剧本</button>
          <button id="btn-decompose" class="btn" type="button">AI拆解分镜</button>
          <button id="btn-submit-review" class="btn" type="button">提交审核</button>
        </div>
      </article>

      <article class="panel">
        <h2 class="panel-title">分镜预览</h2>
        <ul id="script-scenes-list" class="list">
          <li class="list-item">暂无分镜</li>
        </ul>
      </article>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/script-page.js"></script>
</body>
</html>
