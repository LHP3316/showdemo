<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧本工位 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/script-modern.css">
</head>
<body class="script-screen">
  <main class="script-page" aria-label="剧本工位">
    <section class="script-localbar" aria-label="剧本工位顶部栏">
      <div class="script-localbar__left">
        <h1 id="script-page-title" class="script-title">剧本工位</h1>
        <p id="script-page-subtitle" class="script-badge">寻龙少年 · 第7集</p>
      </div>

      <div class="script-localbar__right" aria-label="快捷操作">
        <button class="script-btn script-btn--ghost" type="button" data-action="import">上传剧本文件</button>
        <button class="script-btn script-btn--ghost" type="button" data-action="save">保存草稿</button>
        <button class="script-btn script-btn--purple" type="button" data-action="decompose">AI分镜</button>
        <button class="script-btn script-btn--gold" type="button" data-action="submit">提交审核</button>
      </div>
    </section>

    <section class="script-layout" aria-label="剧本编辑区">
      <section class="script-main" aria-label="剧本编辑">
        <header class="script-meta" aria-label="项目信息">
          <dl class="script-meta-grid">
            <div>
              <dt>项目</dt>
              <dd id="script-project-name">寻龙少年·热血奇遇记</dd>
            </div>
            <div>
              <dt>集数</dt>
              <dd id="script-project-episode">第7集</dd>
            </div>
            <div>
              <dt>编剧</dt>
              <dd id="script-project-writer">李编剧</dd>
            </div>
          </dl>
          <span id="script-project-stage" class="script-stage">草稿编辑中</span>
        </header>

        <div class="script-form">
          <div class="script-field">
            <label for="script-project-intro-input" class="script-label">项目简介</label>
            <textarea id="script-project-intro-input" class="script-input script-input--summary" rows="3" placeholder="可选：填写项目简介"></textarea>
          </div>

          <div class="script-field">
            <label for="script-title-input" class="script-label">集标题</label>
            <input id="script-title-input" class="script-input" type="text" value="" placeholder="例如：第七集 · 古龙苏醒">
          </div>

          <div class="script-field">
            <label for="script-episode-summary-input" class="script-label">集简介</label>
            <textarea id="script-episode-summary-input" class="script-input script-input--summary" rows="3" placeholder="可选：填写本集简介"></textarea>
          </div>

          <div class="script-field">
            <div class="script-field-head">
              <label for="script-editor" class="script-label">剧本内容</label>
            </div>
            <textarea id="script-editor" class="script-input script-input--editor" rows="18" placeholder="在这里编辑项目剧本..."></textarea>
            <input id="script-file-input" type="file" accept=".txt,.md,.markdown" hidden>
          </div>
        </div>

        <footer class="script-bottom-actions" aria-label="底部操作">
          <button class="script-btn script-btn--ghost script-btn--bottom" type="button" data-action="import">上传剧本文件</button>
          <button class="script-btn script-btn--ghost script-btn--bottom" type="button" data-action="save">保存草稿</button>
          <button class="script-btn script-btn--purple script-btn--bottom" type="button" data-action="decompose">AI分镜</button>
          <button class="script-btn script-btn--gold script-btn--bottom" type="button" data-action="submit">提交审核</button>
        </footer>

        <p id="script-status" class="script-status" role="status" aria-live="polite">Ready</p>
      </section>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/script-page.js"></script>
</body>
</html>
