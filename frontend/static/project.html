<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目详情 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/project-modern.css">
</head>
<body>
  <main class="project-page">
    <header class="project-topbar">
      <div class="brand">
        <span class="brand-badge">AI</span>
        <span class="brand-name">AI短剧协作台</span>
      </div>
      <nav class="top-nav">
        <button id="nav-workspace" class="top-nav-btn" type="button">工作台</button>
        <button id="nav-project" class="top-nav-btn active" type="button">项目管理</button>
        <button id="nav-render" class="top-nav-btn" type="button">生成队列</button>
        <button id="nav-review" class="top-nav-btn" type="button">审核中心</button>
      </nav>
      <div class="top-right">
        <span class="avatar">U</span>
        <span id="top-username" class="username">User</span>
        <button id="btn-logout" class="logout-btn" type="button">退出</button>
      </div>
    </header>

    <section class="project-header">
      <div class="breadcrumb">项目管理 / <span id="project-breadcrumb-current">加载中...</span></div>
      <h1 id="project-title" class="project-title">加载中...</h1>
      <p id="project-subtitle" class="project-subtitle">正在加载项目信息...</p>
      <div id="project-meta" class="project-meta-pill">N/A</div>
    </section>

    <section class="project-layout">
      <div class="panel">
        <h2 class="panel-title">制作进度</h2>
        <div class="progress-row">
          <div id="project-progress-summary">-</div>
          <div id="project-progress-percent" class="progress-percent">0%</div>
        </div>
        <div class="progress-track">
          <div id="project-progress-bar" class="progress-bar"></div>
        </div>
        <ul class="status-list">
          <li>剧本阶段: 已完成</li>
          <li>分镜阶段: 进行中</li>
          <li>生成阶段: 待开始</li>
        </ul>
      </div>

      <div class="panel">
        <h2 class="panel-title">资产统计</h2>
        <div class="asset-grid">
          <div class="asset-card">
            <div id="asset-images" class="asset-num">0</div>
            <div class="asset-label">分镜图</div>
          </div>
          <div class="asset-card">
            <div id="asset-videos" class="asset-num">0</div>
            <div class="asset-label">视频片段</div>
          </div>
          <div class="asset-card">
            <div id="asset-scenes" class="asset-num">0</div>
            <div class="asset-label">总场景</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">项目时间线</h2>
        <ul id="project-timeline" class="timeline-list">
          <li>加载中...</li>
        </ul>
      </div>

      <div class="panel">
        <h2 class="panel-title">阻塞问题</h2>
        <ul id="project-blockers" class="blocker-list">
          <li>加载中...</li>
        </ul>
      </div>

      <div class="panel">
        <h2 class="panel-title">快速操作</h2>
        <div class="quick-actions">
          <button id="btn-go-script" class="action-btn" type="button">进入剧本工位</button>
          <button id="btn-go-storyboard" class="action-btn" type="button">进入分镜工位</button>
          <button id="btn-go-render" class="action-btn" type="button">查看生成队列</button>
          <button id="btn-go-review" class="action-btn" type="button">进入审核中心</button>
          <button id="btn-go-export" class="action-btn" type="button">进入导出交付</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/project.js"></script>
  <script src="js/page-tools.js"></script>
</body>
</html>
