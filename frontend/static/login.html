<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Studio Platform</title>
  <link rel="stylesheet" href="css/font.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.14), transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(0, 140, 255, 0.12), transparent 36%),
                  #0a0a0f;
    }

    .login-card {
      width: min(420px, 92vw);
      border: 1px solid rgba(255, 215, 0, 0.25);
      border-radius: 16px;
      background: rgba(18, 18, 26, 0.95);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      padding: 24px;
    }

    .login-title {
      color: #fff;
      font-size: 24px;
      margin-bottom: 6px;
    }

    .login-subtitle {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .login-label {
      color: #e5e7eb;
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
    }

    .login-btn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      color: #0a0a0f;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffd700, #ffb700);
      margin-top: 4px;
    }

    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <h1 class="login-title">AI Studio Login</h1>
      <p class="login-subtitle">Use your account from backend user table</p>

      <form id="loginForm" class="static-login-form" autocomplete="on">
        <label class="login-label" for="username">Username</label>
        <input id="username" name="username" class="static-login-input" type="text" autocomplete="username" placeholder="Username">

        <label class="login-label" for="password">Password</label>
        <input id="password" name="password" class="static-login-input" type="password" autocomplete="current-password" placeholder="Password">

        <div id="errorMessage" class="static-login-error"></div>
        <button id="loginBtn" class="login-btn" type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
