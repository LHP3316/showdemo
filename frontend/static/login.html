<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - AI短剧协作台</title>
  <link rel="stylesheet" href="css/font.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card" aria-labelledby="loginTitle">
      <header class="login-header">
        <div class="login-logo" aria-hidden="true">AI</div>
        <h1 id="loginTitle" class="login-title">AI短剧协作台</h1>
        <p class="login-subtitle">电影工业级创作协作平台</p>
      </header>

      <form id="loginForm" class="static-login-form" autocomplete="on">
        <label class="login-label" for="username">账号</label>
        <input id="username" name="username" class="static-login-input" type="text" autocomplete="username" placeholder="请输入您的账号">

        <label class="login-label" for="password">密码</label>
        <input id="password" name="password" class="static-login-input" type="password" autocomplete="current-password" placeholder="请输入您的密码">

        <div id="loginNotice" class="static-login-notice" role="status" aria-live="polite" hidden></div>
        <div id="errorMessage" class="static-login-error" role="alert" aria-live="polite"></div>
        <button id="loginBtn" class="login-btn" type="submit">立即登录</button>
      </form>

      <p class="login-help">成为工作人员请 <a href="register.html" class="login-link-register">注册</a></p>
      <hr class="login-divider">
      <footer class="login-footer">© 2024 AI短剧协作台 · 专业版 v2.1</footer>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
