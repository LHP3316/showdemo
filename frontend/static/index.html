<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI短剧协作平台</title>
</head>
<body>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script>
    (function () {
      // 统一走 common.js 的会话逻辑，避免硬编码 fetch / base url 导致不一致
      if (!window.CommonApp) {
        window.location.replace("login.html");
        return;
      }
      CommonApp.ensureSession(false).then(function (ok) {
        window.location.replace(ok ? "workspace.html" : "login.html");
      }).catch(function () {
        window.location.replace("login.html");
      });
    })();
  </script>
</body>
</html>
