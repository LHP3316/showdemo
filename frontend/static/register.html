<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - AI短剧协作台</title>
  <link rel="stylesheet" href="css/font.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card" aria-labelledby="registerTitle">
      <header class="login-header">
        <div class="login-logo" aria-hidden="true">AI</div>
        <h1 id="registerTitle" class="login-title">创建账号</h1>
        <p class="login-subtitle">新账号将用于平台协作（导演/工作人员）</p>
      </header>

      <form id="registerForm" class="static-login-form" autocomplete="on">
        <label class="login-label" for="reg-role">角色</label>
        <select id="reg-role" name="role" class="static-login-input" required>
          <option value="director">导演</option>
          <option value="staff" selected>工作人员</option>
        </select>

        <label class="login-label" for="reg-username">账号</label>
        <input id="reg-username" name="username" class="static-login-input" type="text" autocomplete="username" minlength="3" maxlength="50" required placeholder="仅用于登录，全平台唯一（3–50 位）">

        <label class="login-label" for="reg-display-name">用户名</label>
        <input id="reg-display-name" name="display_name" class="static-login-input" type="text" autocomplete="name" maxlength="100" required placeholder="平台展示用，可与他人重名（最多 100 字）">

        <label class="login-label" for="reg-password">密码</label>
        <input id="reg-password" name="password" class="static-login-input" type="password" autocomplete="new-password" minlength="6" maxlength="100" required placeholder="请设置密码（至少 6 位）">

        <label class="login-label" for="reg-password2">确认密码</label>
        <input id="reg-password2" name="password2" class="static-login-input" type="password" autocomplete="new-password" minlength="6" required placeholder="请再次输入密码">

        <div id="errorMessage" class="static-login-error" role="alert" aria-live="polite"></div>
        <button id="registerBtn" class="login-btn" type="submit">完成注册</button>
      </form>

      <p class="login-help">已有账号？ <a href="login.html" class="login-link-register">立即登录</a></p>
      <hr class="login-divider">
      <footer class="login-footer">© 2024 AI短剧协作台 · 专业版 v2.1</footer>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
