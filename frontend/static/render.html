<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI生成队列 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/render-queue-modern.css">
</head>
<body class="render-screen">
  <!-- 列表为静态演示；接数据时再加 js/render-page.js。顶栏由 common.js 注入，需已登录且能访问后端 /auth/me -->
  <main class="rq-page" aria-label="AI生成队列">
    <header class="rq-header">
      <div class="rq-header__left">
        <h1 class="rq-header__title">AI生成队列</h1>
        <p class="rq-header__sub">寻龙少年 · 热血奇遇记 · 第6集 · 共24个场景</p>
      </div>
      <div class="rq-header__pills" aria-label="整集进度">
        <div class="rq-pill rq-pill--done">
          <span class="rq-pill__dot" aria-hidden="true"></span>
          <span>已完成 <strong>8</strong></span>
        </div>
        <div class="rq-pill rq-pill--gen">
          <span class="rq-pill__dot" aria-hidden="true"></span>
          <span>生成中 <strong>3</strong></span>
        </div>
        <div class="rq-pill rq-pill--wait">
          <span class="rq-pill__dot" aria-hidden="true"></span>
          <span>待生成 <strong>13</strong></span>
        </div>
      </div>
    </header>

    <section class="rq-grid" aria-label="分镜场景卡片（静态演示）">
      <!-- Card 1：图已完成 -->
      <article class="rq-card rq-card--imdone">
        <div class="rq-card__media rq-media--demo-statue">
          <div class="rq-badge-rt">已完成</div>
        </div>
        <div class="rq-card__body">
          <div class="rq-row-top">
            <h2 class="rq-scene-name">Scene 01</h2>
            <span class="rq-st-badge rq-st-badge--done">已完成</span>
          </div>
          <p class="rq-desc">摄像机从高处俯拍，主角骑马奔跑</p>
        </div>
        <div class="rq-foot">
          <button type="button" class="rq-btn rq-btn--line-yellow">重新生图</button>
          <button type="button" class="rq-btn rq-btn--purple">图生视频</button>
        </div>
      </article>

      <!-- Card 2：生成中 -->
      <article class="rq-card rq-card--gen">
        <div class="rq-card__media">
          <div class="rq-gen-placeholder">
            <div class="rq-spin" aria-hidden="true"></div>
            <span>AI生成中…</span>
          </div>
        </div>
        <div class="rq-card__body">
          <div class="rq-row-top">
            <h2 class="rq-scene-name">Scene 03</h2>
            <span class="rq-st-badge rq-st-badge--gen">生成中</span>
          </div>
          <p class="rq-desc">中景，主角缓缓走向神秘石碑前</p>
        </div>
        <div class="rq-foot">
          <button type="button" class="rq-btn rq-btn--full rq-btn--ghost">取消生成</button>
        </div>
      </article>

      <!-- Card 3：待生成 -->
      <article class="rq-card rq-card--pend">
        <div class="rq-card__media">
          <div class="rq-pend-placeholder">
            <div class="rq-pend-icon" aria-hidden="true"></div>
            <span>等待生成</span>
          </div>
        </div>
        <div class="rq-card__body">
          <div class="rq-row-top">
            <h2 class="rq-scene-name">Scene 04</h2>
            <span class="rq-st-badge rq-st-badge--pend">待生成</span>
          </div>
          <p class="rq-desc">广角全景，远山云雾缭绕背景</p>
        </div>
        <div class="rq-foot">
          <button type="button" class="rq-btn rq-btn--yellow">立即生图</button>
          <button type="button" class="rq-btn rq-btn--video-muted">生成视频</button>
        </div>
      </article>

      <!-- Card 4：视频已完成 -->
      <article class="rq-card rq-card--vdone">
        <div class="rq-card__media rq-media--demo-mountain">
          <div class="rq-badge-lt">视频已完成</div>
        </div>
        <div class="rq-card__body">
          <div class="rq-row-top">
            <h2 class="rq-scene-name">Scene 02</h2>
            <span class="rq-st-badge rq-st-badge--video">视频完成</span>
          </div>
          <p class="rq-desc">近景特写，主角转身发现龙骨遗迹</p>
        </div>
        <div class="rq-foot">
          <button type="button" class="rq-btn rq-btn--line-gray">预览视频</button>
          <button type="button" class="rq-btn rq-btn--line-yellow">重新生成</button>
        </div>
      </article>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
