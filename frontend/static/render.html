<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成队列 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/workbench-modern.css">
</head>
<body>
  <main class="app-page">
    <section class="page-header">
      <h1 id="render-page-title" class="page-title">生成队列</h1>
      <p id="render-page-subtitle" class="page-subtitle">加载中...</p>
      <div id="render-status" class="status-line">Ready</div>
    </section>

    <section class="grid-2">
      <article class="panel">
        <h2 class="panel-title">场景任务</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Scene</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="render-scene-body">
            <tr><td colspan="3">暂无数据</td></tr>
          </tbody>
        </table>
      </article>

      <article class="panel">
        <h2 class="panel-title">任务队列</h2>
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>类型</th>
              <th>状态</th>
              <th>进度</th>
            </tr>
          </thead>
          <tbody id="render-task-body">
            <tr><td colspan="4">暂无任务</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/render-page.js"></script>
</body>
</html>
