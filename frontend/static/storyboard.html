<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分镜工位 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/workbench-modern.css">
</head>
<body>
  <main class="app-page">
    <section class="page-header">
      <h1 id="storyboard-page-title" class="page-title">分镜工位</h1>
      <p id="storyboard-page-subtitle" class="page-subtitle">加载中...</p>
      <div id="storyboard-status" class="status-line">Ready</div>
    </section>

    <section class="grid-2">
      <article class="panel">
        <h2 class="panel-title">新增分镜</h2>
        <div class="actions">
          <input id="scene-description" class="input" placeholder="场景描述">
          <input id="scene-prompt" class="input" placeholder="AI Prompt">
        </div>
        <div class="actions" style="margin-top:10px;">
          <button id="btn-add-scene" class="btn btn-primary" type="button">新增分镜</button>
          <button id="btn-batch-image" class="btn" type="button">批量文生图</button>
          <button id="btn-batch-video" class="btn" type="button">批量图生视频</button>
        </div>
      </article>

      <article class="panel">
        <h2 class="panel-title">分镜列表</h2>
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>描述</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="scene-table-body">
            <tr><td colspan="4">暂无数据</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/storyboard-page.js"></script>
</body>
</html>
