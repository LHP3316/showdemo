<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分镜工位 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/storyboard-modern.css">
</head>
<body class="storyboard-screen">
  <main class="sb-page" aria-label="分镜工位">
    <section class="sb-localbar" aria-label="分镜工位头部">
      <div class="sb-localbar__left">
        <button id="sb-back" class="sb-back" type="button" aria-label="返回">返回</button>
        <h1 id="storyboard-page-title" class="sb-title">分镜工位</h1>
        <p id="storyboard-page-subtitle" class="sb-badge">寻龙少年 · 第6集</p>
      </div>

      <div class="sb-localbar__right" aria-label="快捷操作">
        <button id="btn-save-draft" class="sb-btn sb-btn--ghost" type="button">保存草稿</button>
        <button id="btn-submit-review" class="sb-btn sb-btn--green" type="button">提交审核</button>
      </div>
    </section>

    <section class="sb-layout" aria-label="分镜工位布局">
      <aside class="sb-sidebar" aria-label="分镜列表">
        <header class="sb-panel-head">
          <h2 class="sb-panel-title sb-panel-title--sidebar">分镜列表</h2>
          <span id="sb-scene-count" class="sb-count">24场</span>
        </header>
        <div class="sb-list" id="sb-scene-list" role="list">
          <article class="sb-item is-active" role="listitem" data-id="seed-3">
            <span class="sb-item__icon">□</span>
            <div>
              <h3 class="sb-item__name">Scene 03</h3>
              <p class="sb-item__subtitle">中景，主角缓缓走向神秘石碑前</p>
            </div>
          </article>
          <article class="sb-item" role="listitem" data-id="seed-1">
            <span class="sb-item__icon is-done">✓</span>
            <div>
              <h3 class="sb-item__name">Scene 01</h3>
              <p class="sb-item__subtitle">摄像机从高处俯拍，主角骑马奔跑</p>
            </div>
          </article>
          <article class="sb-item" role="listitem" data-id="seed-2">
            <span class="sb-item__icon is-done">✓</span>
            <div>
              <h3 class="sb-item__name">Scene 02</h3>
              <p class="sb-item__subtitle">近景特写，主角转身发现龙骨遗迹</p>
            </div>
          </article>
          <article class="sb-item" role="listitem" data-id="seed-4">
            <span class="sb-item__icon">◷</span>
            <div>
              <h3 class="sb-item__name">Scene 04</h3>
              <p class="sb-item__subtitle">广角全景，远山云雾缭绕背景</p>
            </div>
          </article>
          <article class="sb-item" role="listitem" data-id="seed-5">
            <span class="sb-item__icon">◷</span>
            <div>
              <h3 class="sb-item__name">Scene 05</h3>
              <p class="sb-item__subtitle">主角取出宝剑，发出金色光芒</p>
            </div>
          </article>
        </div>
      </aside>

      <section class="sb-canvas" aria-label="分镜预览">
        <div class="sb-media-tabs" role="tablist" aria-label="生成类型切换">
          <button id="tab-image" class="sb-media-tab is-active" type="button" role="tab" aria-selected="true" data-tab="image">图片</button>
          <button id="tab-video" class="sb-media-tab" type="button" role="tab" aria-selected="false" data-tab="video">视频</button>
        </div>
        <div class="sb-preview">
          <img id="sb-preview-image" class="sb-preview-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="分镜预览图">
          <video id="sb-preview-video" class="sb-preview-video" controls playsinline hidden></video>
        </div>
        <div id="sb-preview-thumbs" class="sb-preview-thumbs" aria-label="分镜图片缩略图" hidden></div>

        <div class="sb-timeline" aria-label="分镜信息">
          <span class="sb-timeline__tag" id="sb-active-tag">Scene 03 / 第6集</span>
          <p class="sb-timeline__desc" id="sb-active-desc">中景，主角缓缓走向神秘石碑前</p>
          <span class="sb-timeline__spacer"></span>
          <button class="sb-mini" id="sb-prev" type="button" aria-label="上一场">‹</button>
          <button class="sb-mini" id="sb-next" type="button" aria-label="下一场">›</button>
        </div>

        <div id="storyboard-status" class="sb-status" aria-live="polite"></div>
        <div id="sb-progress-wrap" class="sb-progress" hidden aria-live="polite">
          <div class="sb-progress__meta">
            <span id="sb-progress-text" class="sb-progress__text">正在处理…</span>
            <span id="sb-progress-time" class="sb-progress__time">0s</span>
          </div>
          <div class="sb-progress__track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="sb-progress-fill" class="sb-progress__fill" style="width: 0%;"></div>
          </div>
        </div>
      </section>

      <aside class="sb-editor" aria-label="场景编辑">
        <header class="sb-panel-head sb-panel-head--editor">
          <h2 class="sb-panel-title sb-panel-title--editor">场景编辑</h2>
          <p id="sb-editor-title" class="sb-panel-sub">Scene 03 · 第6集</p>
        </header>

        <section class="sb-form" aria-label="编辑表单">
          <div class="sb-field">
            <label class="sb-label" for="scene-characters">角色（逗号分隔）</label>
            <input id="scene-characters" class="sb-select" type="text" placeholder="例如：主角,反派,配角">
          </div>

          <div class="sb-field">
            <label class="sb-label" for="scene-description">场景描述</label>
            <textarea id="scene-description" class="sb-textarea" placeholder="请输入场景描述"></textarea>
          </div>

          <div class="sb-field">
            <label class="sb-label" for="scene-dialogue">台词</label>
            <textarea id="scene-dialogue" class="sb-textarea" placeholder="请输入台词（可选）"></textarea>
          </div>

          <div class="sb-field">
            <label class="sb-label" for="scene-emotion">情绪</label>
            <input id="scene-emotion" class="sb-select" type="text" placeholder="例如：紧张 / 温馨 / 悬疑">
          </div>

          <div id="field-image-prompt" class="sb-field">
            <label class="sb-label" for="scene-image-prompt">图片提示词（文生图）</label>
            <textarea id="scene-image-prompt" class="sb-textarea sb-textarea--prompt" placeholder="请输入图片提示词（用于生成图片）"></textarea>
            <div class="sb-param-grid" aria-label="图片生成参数">
              <div class="sb-field">
                <label class="sb-label" for="img-size">尺寸</label>
                <select id="img-size" class="sb-select">
                  <option value="1280x720">1280x720</option>
                  <option value="1024x1024">1024x1024</option>
                  <option value="1920x1080">1920x1080</option>
                </select>
              </div>
              <div class="sb-field">
                <label class="sb-label" for="img-count">张数</label>
                <input id="img-count" class="sb-select" type="number" min="1" max="4" step="1" value="1">
              </div>
            </div>
          </div>

          <div id="field-video-prompt" class="sb-field" hidden>
            <label class="sb-label" for="scene-video-prompt">视频提示词（图生视频）</label>
            <textarea id="scene-video-prompt" class="sb-textarea sb-textarea--prompt" placeholder="请输入视频提示词（用于生成视频，可与图片不同）"></textarea>
            <div class="sb-param-grid" aria-label="视频生成参数">
              <div class="sb-field">
                <label class="sb-label" for="vid-seconds">时长（秒）</label>
                <input id="vid-seconds" class="sb-select" type="number" min="4" max="15" step="1" value="5">
              </div>
              <div class="sb-field">
                <label class="sb-label" for="vid-size">分辨率</label>
                <select id="vid-size" class="sb-select">
                  <option value="720P">720P（1280x720）</option>
                  <option value="1080P">1080P（1920x1080）</option>
                </select>
              </div>
              <div class="sb-field">
                <label class="sb-label" for="vid-aspect">比例</label>
                <select id="vid-aspect" class="sb-select">
                  <option value="16:9">16:9</option>
                  <option value="9:16">9:16</option>
                  <option value="1:1">1:1</option>
                </select>
              </div>
            </div>
          </div>

          <div class="sb-actions" aria-label="生成操作">
            <button id="btn-gen-image" class="sb-btn sb-btn--gold sb-btn--wide" type="button">生成图片</button>
            <button id="btn-gen-video" class="sb-btn sb-btn--purple sb-btn--wide" type="button" hidden>生成视频</button>
          </div>
        </section>
      </aside>
    </section>
  </main>
  <div id="sb-toast" class="sb-toast" hidden aria-live="polite">
    <span id="sb-toast-text" class="sb-toast__text"></span>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/storyboard-page.js"></script>
</body>
</html>
