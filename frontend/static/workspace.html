<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/workspace-modern.css">
</head>
<body>
  <main class="workspace-page">
    <section class="hero" aria-label="欢迎信息">
      <div>
        <h1 id="workspace-welcome">欢迎回来，User</h1>
        <p id="workspace-subtitle">今天共参与 0 个项目</p>
      </div>
      <button id="btn-refresh" class="refresh-btn" type="button">刷新</button>
    </section>

    <section class="stats-grid" aria-label="统计数据">
      <button class="stat-card stat-action" id="stat-action-project" type="button">
        <div class="stat-title">参与项目</div>
        <div id="stat-total" class="stat-num">0</div>
        <div class="stat-desc">个在制作中</div>
      </button>
      <button class="stat-card stat-action" id="stat-action-task" type="button">
        <div class="stat-title">待处理任务</div>
        <div id="stat-pending-tasks" class="stat-num">0</div>
        <div class="stat-desc">需要您的处理</div>
      </button>
      <button class="stat-card stat-action" id="stat-action-review" type="button">
        <div class="stat-title">待审核</div>
        <div id="stat-review" class="stat-num">0</div>
        <div class="stat-desc">分镜待审批</div>
      </button>
      <button class="stat-card stat-action" id="stat-action-done" type="button">
        <div class="stat-title">已完成项目</div>
        <div id="stat-done" class="stat-num">0</div>
        <div class="stat-desc">精彩短剧上线</div>
      </button>
    </section>

    <section class="workspace-layout" aria-label="任务与项目">
      <article class="panel panel-tasks">
        <header class="panel-head">
          <h2 class="panel-title">我的任务</h2>
          <span id="tasks-count-pill" class="pill">0 个待处理</span>
        </header>
        <ul id="task-list" class="list task-list" aria-label="任务列表"></ul>
      </article>

      <article class="panel panel-projects">
        <header class="panel-head">
          <h2 class="panel-title">最近项目</h2>
          <button id="btn-new-project" class="primary-btn" type="button">+ 新建项目</button>
        </header>
        <ul id="recent-project-list" class="list project-list" aria-label="项目列表"></ul>
      </article>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/workspace.js"></script>
  <script src="js/page-tools.js"></script>
</body>
</html>
