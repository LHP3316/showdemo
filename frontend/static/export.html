<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导出中心 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/export-modern.css">
</head>
<body class="export-screen">
  <main class="export-page" aria-label="导出中心页面">
    <header class="export-hero" aria-label="导出中心头部">
      <section class="export-hero__intro">
        <h1 id="export-page-title" class="export-title">导出中心</h1>
        <p id="export-page-subtitle" class="export-subtitle">寻龙少年 · 热血奇遇记 · 全12集 · 审核已通过 · 可导出</p>
        <p id="export-status" class="export-status" aria-live="polite"></p>
      </section>
      <nav class="export-hero__actions" aria-label="头部操作">
        <button id="btn-export-package" class="action-btn action-btn--gold" type="button">打包下载全部</button>
      </nav>
    </header>

    <section class="export-layout" aria-label="导出中心内容">
      <section class="asset-panel" aria-labelledby="asset-title">
        <h2 id="asset-title" class="section-title">资产清单</h2>
        <div class="asset-table" role="table" aria-label="资产列表">
          <div class="asset-table__head" role="row">
            <span role="columnheader">资产名称</span>
            <span role="columnheader">类型</span>
            <span role="columnheader">大小</span>
            <span role="columnheader">状态</span>
            <span role="columnheader">操作</span>
          </div>
          <div id="export-assets-body" class="asset-table__body" role="rowgroup">
            <div class="asset-row" role="row">
              <div class="asset-name" role="cell">寻龙少年_第01集_分镜图集.zip</div>
              <div role="cell">图片集</div>
              <div role="cell">128 MB</div>
              <div role="cell"><span class="state-pill state-pill--done">已完成</span></div>
              <div role="cell"><button class="download-btn" type="button">下载</button></div>
            </div>
            <div class="asset-row" role="row">
              <div class="asset-name" role="cell">寻龙少年_第01集_视频合集.mp4</div>
              <div role="cell">视频</div>
              <div role="cell">2.4 GB</div>
              <div role="cell"><span class="state-pill state-pill--done">已完成</span></div>
              <div role="cell"><button class="download-btn" type="button">下载</button></div>
            </div>
            <div class="asset-row" role="row">
              <div class="asset-name" role="cell">寻龙少年_第03集_分镜图集.zip</div>
              <div role="cell">图片集</div>
              <div role="cell">119 MB</div>
              <div role="cell"><span class="state-pill state-pill--pending">生成中</span></div>
              <div role="cell"><button class="download-btn download-btn--disabled" type="button">等待中</button></div>
            </div>
          </div>
        </div>
        <nav class="export-pagination" aria-label="资产分页">
          <button id="export-page-prev" class="export-page-btn" type="button">上一页</button>
          <span id="export-page-info" class="export-page-info">第 1 / 1 页</span>
          <button id="export-page-next" class="export-page-btn" type="button">下一页</button>
        </nav>
      </section>

      <aside class="stats-panel" aria-label="导出统计">
        <h2 class="section-title">导出统计</h2>

        <article class="stat-card">
          <h3 class="stat-card__title">项目导出摘要</h3>
          <dl class="stat-list">
            <div class="stat-item">
              <dt>总资产数量</dt>
              <dd id="export-total-assets">0 个文件</dd>
            </div>
            <div class="stat-item">
              <dt>分镜图片</dt>
              <dd class="accent-blue" id="export-images">168 张</dd>
            </div>
            <div class="stat-item">
              <dt>视频片段</dt>
              <dd class="accent-purple" id="export-videos">84 个</dd>
            </div>
            <div class="stat-item export-hidden-metric">
              <dt>总场景</dt>
              <dd id="export-total-scenes">0</dd>
            </div>
          </dl>
        </article>

        <article class="stat-card">
          <h3 class="stat-card__title">导出格式</h3>
          <div class="format-list" role="group" aria-label="导出格式">
            <button class="format-chip is-active" type="button">ZIP</button>
          </div>
        </article>
      </aside>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/export-page.js"></script>
</body>
</html>
