<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导出交付 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/workbench-modern.css">
</head>
<body>
  <main class="app-page">
    <section class="page-header">
      <h1 id="export-page-title" class="page-title">导出交付</h1>
      <p id="export-page-subtitle" class="page-subtitle">加载中...</p>
      <div id="export-status" class="status-line">Ready</div>
    </section>

    <section class="grid-2">
      <article class="panel">
        <h2 class="panel-title">资产统计</h2>
        <div class="row"><span>总场景</span><span id="export-total-scenes" class="badge">0</span></div>
        <div class="row"><span>图片数量</span><span id="export-images" class="badge">0</span></div>
        <div class="row"><span>视频数量</span><span id="export-videos" class="badge">0</span></div>
        <div class="actions" style="margin-top:10px;">
          <button id="btn-export-package" class="btn btn-primary" type="button">生成导出包</button>
        </div>
      </article>

      <article class="panel">
        <h2 class="panel-title">资产列表</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Scene</th>
              <th>Image</th>
              <th>Video</th>
            </tr>
          </thead>
          <tbody id="export-assets-body">
            <tr><td colspan="3">暂无数据</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/export-page.js"></script>
</body>
</html>
