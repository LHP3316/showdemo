<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核中心 - AI短剧协作平台</title>
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/workbench-modern.css">
</head>
<body>
  <main class="app-page">
    <section class="page-header">
      <h1 id="review-page-title" class="page-title">审核中心</h1>
      <p id="review-page-subtitle" class="page-subtitle">加载中...</p>
      <div id="review-status" class="status-line">Ready</div>
    </section>

    <section class="grid-2">
      <article class="panel">
        <h2 class="panel-title">提交审核结论</h2>
        <div class="actions">
          <select id="review-result" class="input">
            <option value="approved">approved</option>
            <option value="rejected">rejected</option>
          </select>
          <input id="review-comment" class="input" placeholder="审核意见">
        </div>
        <div class="actions" style="margin-top:10px;">
          <button id="btn-submit-review" class="btn btn-primary" type="button">提交审核</button>
        </div>
      </article>

      <article class="panel">
        <h2 class="panel-title">历史审核</h2>
        <table class="table">
          <thead>
            <tr>
              <th>状态</th>
              <th>意见</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody id="review-history-body">
            <tr><td colspan="3">暂无历史</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/review-page.js"></script>
</body>
</html>
